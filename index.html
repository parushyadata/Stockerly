<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stockerly | Market Insights</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
  <div id="app">
    <header>
      <h1>Stockerly</h1>
      <p>Real-time Market Data at your fingertips.</p>
    </header>

    <main>
      <section class="search-area">
        <input type="text" id="searchInput" placeholder="Enter Symbol (e.g. AAPL)" />
        <button id="searchBtn">Search</button>
      </section>

      <div id="statusMessage"></div>

      <div id="stockDisplay" class="results-grid"></div>
    </main>
  </div>
  <div class="controls">
    <button id="sortBtn">Sort by Price</button>
    <button id="filterBtn">Show Stocks > $150</button>
    <button id="showAllBtn">Show All</button>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>

</html>
